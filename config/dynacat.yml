pages:
  - name: Home
    # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
    # hide-desktop-navigation: true
    # hide-from-navigation: true
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday

          - type: rss
            limit: 10
            collapse-after: 3
            cache: 12h
            feeds:
              - url: https://selfh.st/rss/
                title: selfh.st
                limit: 4
              - url: https://ciechanow.ski/atom.xml
              - url: https://www.joshwcomeau.com/rss.xml
                title: Josh Comeau
              - url: https://samwho.dev/rss.xml
              - url: https://ishadeed.com/feed.xml
                title: Ahmad Shadeed

          - type: twitch-channels
            channels:
              - theprimeagen
              - j_blow
              - giantwaffle
              - cohhcarnage
              - christitustech
              - EJ_SA

      - size: full
        widgets:
          - type: group
            widgets:
              - type: hacker-news
              - type: lobsters

          - type: videos
            channels:
              - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
              - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
              - UCsBjURrPoezykLs9EqgamOA # Fireship
              - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
              - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium

          - type: group
            widgets:
              - type: reddit
                subreddit: technology
                show-thumbnails: true
              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true

      - size: small
        widgets:
          - type: weather
            location: London, United Kingdom
            units: metric # alternatively "imperial"
            hour-format: 12h # alternatively "24h"
            # Optionally hide the location from being displayed in the widget
            # hide-location: true

          - type: markets
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: MSFT
                name: Microsoft

  - name: System
    columns:
      - size: full
        widgets:
          - type: server-stats
            servers:
              - type: local
                name: This server

          - type: docker-containers
            # Requires mounting the docker socket, see docker-compose.yml
            # sock-path: /var/run/docker.sock

      - size: small
        widgets:
          - type: monitor
            cache: 1m
            title: Services
            sites:
              - title: Dynacat
                url: http://localhost:8080
                method: HEAD
              - title: Google
                url: https://www.google.com
                icon: si:google

          - type: clock
            hour-format: 24h
            timezones:
              - timezone: America/New_York
                label: New York
              - timezone: Europe/London
                label: London
              - timezone: Asia/Tokyo
                label: Tokyo

  - name: Tools
    columns:
      - size: small
        widgets:
          - type: search
            search-engine: duckduckgo
            bangs:
              - title: YouTube
                shortcut: "!yt"
                url: https://www.youtube.com/results?search_query={QUERY}

          - type: to-do
            id: tools-page-todo
            collapse-after: 5

      - size: full
        widgets:
          - type: bookmarks
            groups:
              - title: Dev
                links:
                  - title: GitHub
                    url: https://github.com/
                  - title: Stack Overflow
                    url: https://stackoverflow.com/
              - title: Entertainment
                color: 10 70 50
                links:
                  - title: YouTube
                    url: https://www.youtube.com/
                  - title: Netflix
                    url: https://www.netflix.com/

          - type: html
            source: |
              <p>This is a test page for trying out the <span class="color-primary">Tools</span> layout.</p>

      - size: small
        widgets:
          - type: weather
            location: New York, United States
            units: imperial
            hour-format: 12h

  - name: Dev0
    columns:
      - size: small
        widgets:
          - type: releases
            cache: 1d
            repositories:
              - glanceapp/glance
              - Panonim/dynacat

      - size: full
        widgets:
          - type: repository
            repository: Panonim/dynacat

          - type: group
            widgets:
              - type: hacker-news
                limit: 10
              - type: lobsters
                limit: 10

      - size: small
        widgets:
          - type: iframe
            source: https://status.github.com/
            height: 400

  - name: Dev1
    columns:
      - size: small
        widgets:
          - type: releases
            cache: 1d
            repositories:
              - glanceapp/glance
              - Panonim/dynacat

      - size: full
        widgets:
          - type: repository
            repository: Panonim/dynacat

          - type: group
            widgets:
              - type: hacker-news
                limit: 10
              - type: lobsters
                limit: 10

      - size: small
        widgets:
          - type: iframe
            source: https://status.github.com/
            height: 400

  - name: Dev2
    columns:
      - size: small
        widgets:
          - type: releases
            cache: 1d
            repositories:
              - glanceapp/glance
              - Panonim/dynacat

      - size: full
        widgets:
          - type: repository
            repository: Panonim/dynacat

          - type: group
            widgets:
              - type: hacker-news
                limit: 10
              - type: lobsters
                limit: 10

      - size: small
        widgets:
          - type: iframe
            source: https://status.github.com/
            height: 400
