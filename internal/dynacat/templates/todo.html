{{ template "widget-base.html" . }}

{{ define "widget-content-classes" }}{{ if .Frameless }}widget-content-frameless{{ end }}{{ end }}

{{ define "widget-content" }}
<div class="todo"
     data-todo-id="{{ .TodoID }}"
     data-todo-storage="{{ .Storage }}"
     {{ if .HasCollapseAfter }}data-todo-collapse-after="{{ .GetCollapseAfter }}"{{ end }}></div>
{{ end }}
